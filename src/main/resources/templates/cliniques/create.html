<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head th:replace="~{fragments/layout :: head('Nouvelle clinique')}"></head>
<body>

<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="main-content">
    <div class="page-header">
        <div>
            <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 4px;">
                <a th:href="@{/cliniques}" style="color: var(--text-muted); text-decoration: none;">Cliniques</a>
                &rsaquo; Nouvelle
            </div>
            <h1 class="page-title">Nouvelle clinique</h1>
        </div>
    </div>

    <div class="page-body">
        <form th:action="@{/cliniques}" method="post" th:object="${clinique}" style="max-width: 520px; display: flex; flex-direction: column; gap: 20px;">

            <div class="card card-body" style="display: flex; flex-direction: column; gap: 0;">
                <div class="form-group">
                    <label class="form-label">Nom <span class="required">*</span></label>
                    <input type="text" th:field="*{nom}" class="form-control" required maxlength="150" autofocus>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label class="form-label">Ville</label>
                    <select name="villeId" class="form-control">
                        <option value="">— Aucune —</option>
                        <option th:each="v : ${villes}" th:value="${v.id}" th:text="${v.nom}"></option>
                    </select>
                </div>
            </div>

            <div style="display: flex; gap: 10px;">
                <button type="submit" class="btn btn-primary">Créer</button>
                <a th:href="@{/cliniques}" class="btn btn-secondary">Annuler</a>
            </div>

        </form>
    </div>
</div>

</body>
</html>
