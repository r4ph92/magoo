<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head th:replace="~{fragments/layout :: head('Modifier docteur')}"></head>
<body>

<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="main-content">
    <div class="page-header">
        <div>
            <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 4px;">
                <a th:href="@{/docteurs}" style="color: var(--text-muted); text-decoration: none;">Docteurs</a>
                &rsaquo; Modifier
            </div>
            <h1 class="page-title" th:text="'Modifier — ' + ${docteur.nomComplet}"></h1>
        </div>
    </div>

    <div class="page-body">
        <form th:action="@{/docteurs/{id}(id=${docteur.id})}" method="post" th:object="${docteur}" style="max-width: 520px; display: flex; flex-direction: column; gap: 20px;">

            <div class="card card-body" style="display: flex; flex-direction: column; gap: 0;">
                <div class="form-group">
                    <label class="form-label">Nom complet <span class="required">*</span></label>
                    <input type="text" th:field="*{nomComplet}" class="form-control" required maxlength="150" autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label">Numéro de licence <span class="required">*</span></label>
                    <input type="text" th:field="*{licence}" class="form-control" required maxlength="50">
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label class="form-label">Clinique</label>
                    <select name="cliniqueId" class="form-control">
                        <option value="">— Aucune —</option>
                        <option th:each="c : ${cliniques}"
                                th:value="${c.id}"
                                th:text="${c.nom}"
                                th:selected="${docteur.clinique != null and docteur.clinique.id == c.id}">
                        </option>
                    </select>
                </div>
            </div>

            <div style="display: flex; gap: 10px;">
                <button type="submit" class="btn btn-primary">Enregistrer</button>
                <a th:href="@{/docteurs}" class="btn btn-secondary">Annuler</a>
            </div>

        </form>
    </div>
</div>

</body>
</html>
