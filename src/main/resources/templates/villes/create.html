<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head th:replace="~{fragments/layout :: head('Nouvelle ville')}"></head>
<body>

<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="main-content">
    <div class="page-header">
        <div>
            <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 4px;">
                <a th:href="@{/villes}" style="color: var(--text-muted); text-decoration: none;">Villes</a>
                &rsaquo; Nouvelle
            </div>
            <h1 class="page-title">Nouvelle ville</h1>
        </div>
    </div>

    <div class="page-body">
        <form th:action="@{/villes}" method="post" th:object="${ville}" style="max-width: 520px; display: flex; flex-direction: column; gap: 20px;">

            <div class="card card-body" style="display: flex; flex-direction: column; gap: 0;">
                <div class="form-group">
                    <label class="form-label">Ville <span class="required">*</span></label>
                    <input type="text" th:field="*{nom}" class="form-control" required maxlength="100" autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label">Province</label>
                    <input type="text" th:field="*{province}" class="form-control" maxlength="50" placeholder="Québec">
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label class="form-label">Pays</label>
                    <input type="text" th:field="*{pays}" class="form-control" maxlength="50" placeholder="Canada">
                </div>
            </div>

            <div style="display: flex; gap: 10px;">
                <button type="submit" class="btn btn-primary">Créer</button>
                <a th:href="@{/villes}" class="btn btn-secondary">Annuler</a>
            </div>

        </form>
    </div>
</div>

</body>
</html>
