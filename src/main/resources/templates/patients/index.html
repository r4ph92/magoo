<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head th:replace="~{fragments/layout :: head('Patients')}"></head>
<body>

<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="main-content">
    <div class="page-header">
        <h1 class="page-title">Patients</h1>
        <a th:href="@{/patients/create}" class="btn btn-primary">+ Nouveau patient</a>
    </div>

    <div class="page-body">

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <!-- Filtres -->
        <form method="get" th:action="@{/patients}" style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; align-items: flex-end;">
            <div>
                <label class="form-label" style="font-size: 11px;">Ville</label>
                <select name="villeId" class="form-control" style="min-width: 140px;">
                    <option value="">Toutes les villes</option>
                    <option th:each="v : ${villes}" th:value="${v.id}" th:text="${v.nom}"
                            th:selected="${villeId != null and villeId == v.id}"></option>
                </select>
            </div>
            <div>
                <label class="form-label" style="font-size: 11px;">Médecin</label>
                <select name="docteurId" class="form-control" style="min-width: 160px;">
                    <option value="">Tous les médecins</option>
                    <option th:each="d : ${docteurs}" th:value="${d.id}" th:text="${d.nomComplet}"
                            th:selected="${docteurId != null and docteurId == d.id}"></option>
                </select>
            </div>
            <div>
                <label class="form-label" style="font-size: 11px;">Sexe</label>
                <select name="sexe" class="form-control">
                    <option value="">Tous</option>
                    <option value="Homme" th:selected="${sexe == 'Homme'}">Homme</option>
                    <option value="Femme" th:selected="${sexe == 'Femme'}">Femme</option>
                    <option value="Autre" th:selected="${sexe == 'Autre'}">Autre</option>
                </select>
            </div>
            <div>
                <label class="form-label" style="font-size: 11px;">Rappel</label>
                <select name="nePasRappeler" class="form-control">
                    <option value="">Tous</option>
                    <option value="false" th:selected="${nePasRappeler != null and !nePasRappeler}">À rappeler</option>
                    <option value="true" th:selected="${nePasRappeler != null and nePasRappeler}">Ne pas rappeler</option>
                </select>
            </div>
            <button type="submit" class="btn btn-secondary">Filtrer</button>
            <a th:href="@{/patients}" class="btn btn-secondary">Réinitialiser</a>
        </form>

        <div class="card">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>No dossier</th>
                            <th>Nom</th>
                            <th>Date de naissance</th>
                            <th>Courriel</th>
                            <th>Médecin</th>
                            <th>Statut</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${patients.empty}">
                            <td colspan="7" class="empty-state">Aucun patient enregistré.</td>
                        </tr>
                        <tr th:each="p : ${patients}">
                            <td class="text-muted" th:text="${p.dossierNo ?: '—'}"></td>
                            <td>
                                <a th:href="@{/patients/{id}(id=${p.id})}"
                                   style="font-weight: 500; color: var(--text-primary); text-decoration: none;"
                                   th:text="${p.nomComplet}"></a>
                            </td>
                            <td th:text="${p.dateNaissance != null ? #temporals.format(p.dateNaissance, 'dd/MM/yyyy') : '—'}"></td>
                            <td th:text="${p.courriel ?: '—'}"></td>
                            <td th:text="${p.docteur != null ? p.docteur.nomComplet : '—'}"></td>
                            <td>
                                <span th:if="${p.estDecede}" class="badge badge-red">Décédé</span>
                                <span th:if="${p.nePasRappeler and !p.estDecede}" class="badge badge-gray">Ne pas rappeler</span>
                                <span th:if="${!p.estDecede and !p.nePasRappeler}" class="badge badge-green">Actif</span>
                            </td>
                            <td>
                                <div class="td-actions">
                                    <a th:href="@{/patients/{id}(id=${p.id})}" class="btn btn-secondary btn-sm">Voir</a>
                                    <a th:href="@{/patients/{id}/edit(id=${p.id})}" class="btn btn-secondary btn-sm">Modifier</a>
                                    <form th:action="@{/patients/{id}/delete(id=${p.id})}" method="post"
                                          onsubmit="return confirm('Supprimer ce patient ?')">
                                        <button type="submit" class="btn btn-danger btn-sm">Supprimer</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

</body>
</html>
