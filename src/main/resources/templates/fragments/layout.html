<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">

<!--
  This file is never rendered directly.
  It only provides reusable fragments included by other pages via th:replace.

  Usage in any page:
    <head th:replace="~{fragments/layout :: head('Page Title')}"></head>
    <div th:replace="~{fragments/layout :: sidebar}"></div>
-->

<!-- ── HEAD FRAGMENT ─────────────────────────────────────────────────── -->
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' — Magoo'">Magoo</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<!-- ── SIDEBAR FRAGMENT ───────────────────────────────────────────────── -->
<div th:fragment="sidebar" class="sidebar">

    <div class="sidebar-brand">
        <div class="sidebar-brand-name">Administration Magoo</div>
        <div class="sidebar-brand-sub">Gestion des cliniques</div>
    </div>

    <nav class="sidebar-nav">

        <div class="nav-section-label">Personnes</div>

        <a th:href="@{/patients}"
           th:classappend="${currentUri != null and currentUri.startsWith('/patients')} ? ' active'"
           class="nav-link">
            <!-- person icon -->
            <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="8" r="4"/>
                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
            Patients
        </a>

        <a th:href="@{/docteurs}"
           th:classappend="${currentUri != null and currentUri.startsWith('/docteurs')} ? ' active'"
           class="nav-link">
            <!-- stethoscope-like icon -->
            <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4.5 6.5a4 4 0 0 0 4 4h7a4 4 0 0 1 4 4v0a4 4 0 0 1-4 4h0a4 4 0 0 1-4-4"/>
                <circle cx="4.5" cy="5" r="1.5"/>
                <circle cx="19.5" cy="19" r="1.5"/>
            </svg>
            Docteurs
        </a>

        <div class="nav-section-label">Établissements</div>

        <a th:href="@{/cliniques}"
           th:classappend="${currentUri != null and currentUri.startsWith('/cliniques')} ? ' active'"
           class="nav-link">
            <!-- building icon -->
            <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="7" width="18" height="14" rx="1"/>
                <path d="M3 10h18M9 21V10M15 21V10M8 4h8M12 4V7"/>
            </svg>
            Cliniques
        </a>

        <a th:href="@{/villes}"
           th:classappend="${currentUri != null and currentUri.startsWith('/villes')} ? ' active'"
           class="nav-link">
            <!-- map pin icon -->
            <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2a7 7 0 0 1 7 7c0 5-7 13-7 13S5 14 5 9a7 7 0 0 1 7-7z"/>
                <circle cx="12" cy="9" r="2.5"/>
            </svg>
            Villes
        </a>

        <div class="nav-section-label">Dossiers</div>

        <a th:href="@{/telephones}"
           th:classappend="${currentUri != null and currentUri.startsWith('/telephones')} ? ' active'"
           class="nav-link">
            <!-- phone icon -->
            <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 2 .7 2.9a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.2-1.2a2 2 0 0 1 2.1-.5c.9.3 1.9.6 2.9.7A2 2 0 0 1 22 16.9z"/>
            </svg>
            Téléphones
        </a>

        <a th:href="@{/examens}"
           th:classappend="${currentUri != null and currentUri.startsWith('/examens')} ? ' active'"
           class="nav-link">
            <!-- clipboard icon -->
            <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="8" y="2" width="8" height="4" rx="1"/>
                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
                <path d="M9 12h6M9 16h4"/>
            </svg>
            Examens
        </a>

        <a th:href="@{/liste-examens}"
           th:classappend="${currentUri != null and currentUri.startsWith('/liste-examens')} ? ' active'"
           class="nav-link">
            <!-- list icon -->
            <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <line x1="8" y1="6" x2="21" y2="6"/>
                <line x1="8" y1="12" x2="21" y2="12"/>
                <line x1="8" y1="18" x2="21" y2="18"/>
                <circle cx="3" cy="6" r="1"/>
                <circle cx="3" cy="12" r="1"/>
                <circle cx="3" cy="18" r="1"/>
            </svg>
            Liste d'examens
        </a>

    </nav>

    <div class="sidebar-footer">
        Magoo &copy; 2026
    </div>

</div>

</html>
